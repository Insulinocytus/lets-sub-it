name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
      - "Taskfile.yml"
      - "mise.toml"
      - "backend/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-ci.yml"
      - "Taskfile.yml"
      - "mise.toml"
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        working-directory: backend
        run: go test ./...
