name: Whisper CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/whisper-ci.yml"
      - "Taskfile.yml"
      - "mise.toml"
      - "whisper/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/whisper-ci.yml"
      - "Taskfile.yml"
      - "mise.toml"
      - "whisper/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: whisper/uv.lock

      - name: Install dependencies
        working-directory: whisper
        run: uv sync --dev

      - name: Run whisper tests
        working-directory: whisper
        run: uv run pytest
