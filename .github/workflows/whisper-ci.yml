name: Whisper CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect whisper changes
    runs-on: ubuntu-latest
    outputs:
      whisper: ${{ steps.filter.outputs.whisper }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            whisper:
              - ".github/workflows/whisper-ci.yml"
              - "Taskfile.yml"
              - "mise.toml"
              - "whisper/**"

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.whisper == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: whisper/uv.lock

      - name: Install dependencies
        working-directory: whisper
        run: uv sync --dev

      - name: Run whisper tests
        working-directory: whisper
        run: uv run pytest
