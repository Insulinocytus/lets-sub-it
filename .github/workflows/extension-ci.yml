name: Extension CI

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/extension-ci.yml"
      - "Taskfile.yml"
      - "mise.toml"
      - "extension/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/extension-ci.yml"
      - "Taskfile.yml"
      - "mise.toml"
      - "extension/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Vitest and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Run extension tests
        working-directory: extension
        run: npm run test

      - name: Run extension typecheck
        working-directory: extension
        run: npm run typecheck
