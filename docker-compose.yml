services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "${LSI_DOCKER_BIND_HOST:?set LSI_DOCKER_BIND_HOST in .env}:8080:8080"
    volumes:
      - lsi-data:/data
      - lsi-hf-cache:/huggingface
    restart: unless-stopped

volumes:
  lsi-data:
  lsi-hf-cache:
